L,onUnsavePhrase:v,onUpdateReflection:b})]})}var Us=[{spiritual:{title:"ven a M\xED cuando est\xE9s cansado",teaser:"Tu fuerza no es lo que te sostiene, soy Yo.",reflection:"Has estado cargando solo desde la ma\xF1ana. Cada decisi\xF3n, cada plan, cada peso de los que dependen de ti. Yo s\xE9. Yo veo. Y lo que te digo es esto: no necesitas resolver todo hoy, no necesitas tenerlo todo claro. Suelta el control un momento. Ven a M\xED. Yo voy delante de ti, voy detr\xE1s. Tu descanso en M\xED no es debilidad \u2014 es la \xFAnica fuerza real que existe.",source:"Mateo 11:28-29"},philosophical:{title:"lo peque\xF1o se vuelve todo",teaser:"El car\xE1cter no se forja en lo grande, sino en lo invisible.",reflection:"Nadie te ve hacer la cama. Nadie te ve elegir agua en lugar de caf\xE9 por la tarde. Nadie te ve volver al gimnasio el d\xEDa que no quieres. Y precisamente ah\xED \u2014 en lo invisible, en lo silencioso, en el momento exacto donde no hay aplauso \u2014 es donde se construye quien eres. La libertad no llega por suerte. Llega como recompensa de cada peque\xF1a disciplina que sostuviste cuando nadie te miraba.",source:"Marco Aurelio, Meditaciones IV"}},{spiritual:{title:"Yo estoy aqu\xED, ahora",teaser:"No te pierdas este d\xEDa buscando el siguiente.",reflection:"Vives mucho en la cabeza, pensando en lo que viene, anticipando lo que falta. Pero Yo no estoy en el futuro que te imaginas. Estoy aqu\xED, en este caf\xE9, en esta conversaci\xF3n, en este aliento que est\xE1s tomando ahora. Detente. M\xEDrame en lo que tienes enfrente. Soy m\xE1s real que tus planes.",source:"Salmos 46:10"},philosophical:{title:"haz tuyo lo que es tuyo",teaser:"La paz comienza cuando dejas de pelear con lo que no depende de ti.",reflection:"Hay cosas que est\xE1n bajo tu mando: tus juicios, tus elecciones, tus respuestas. Y hay cosas que no: lo que otros piensan, lo que pas\xF3 ayer, lo que har\xE1n los mercados ma\xF1ana. Toda la angustia humana nace de confundir las dos. Aprende a soltar lo que no te pertenece. Lo que s\xED \u2014 cu\xEDdalo como tesoro.",source:"Epicteto, Enquiridi\xF3n I"}},{spiritual:{title:"eres mi hijo amado",teaser:"Antes de hacer nada, ya eras m\xEDo.",reflection:"Mucho de lo que haces lo haces para probar algo. Para que te respeten, para que te vean, para sentirte digno. Pero esc\xFAchame: tu valor no se gana. No depende de tu \xFAltima victoria ni de tu pr\xF3ximo logro. Yo te am\xE9 antes de que produjeras nada. Eres mi hijo. Descansa en eso. Lo dem\xE1s se ordena solo.",source:"Marcos 1:11"},philosophical:{title:"lo que repites te repite",teaser:"No eres lo que sientes. Eres lo que haces de nuevo.",reflection:"El car\xE1cter no es una decisi\xF3n que tomas una vez; es la suma de las decisiones peque\xF1as que tomas cada d\xEDa. Lo que haces a las cinco de la ma\xF1ana, cuando nadie te ve. Lo que dices cuando est\xE1s cansado. C\xF3mo tratas al que no te puede dar nada. Tus actos repetidos te van esculpiendo, despacio, hasta que un d\xEDa te miras en el espejo y reconoces a quien construiste.",source:"Arist\xF3teles, \xC9tica a Nic\xF3maco II"}},{spiritual:{title:"Yo voy delante de ti",teaser:"El camino que no ves, ya lo camin\xE9.",reflection:"Te paraliza pensar en lo que viene. En las decisiones que a\xFAn no tomas, en los caminos que a\xFAn no se abren. Yo entiendo. Pero aqu\xED est\xE1 la verdad: t\xFA no vas solo, ni vas primero. Yo voy delante. Yo conozco lo que esperas y lo que a\xFAn no imaginas. Camina con confianza, no porque sepas el final, sino porque conf\xEDas en quien camina contigo.",source:"Deuteronomio 31:8"},philosophical:{title:"memento mori",teaser:"Vives mejor cuando recuerdas que vas a morir.",reflection:"No es un pensamiento oscuro: es un pensamiento clarificador. Saber que tu tiempo se acaba \u2014 que el de los que amas tambi\xE9n se acaba \u2014 vac\xEDa las tonter\xEDas y hace lugar para lo que s\xED importa. La pelea peque\xF1a se ve peque\xF1a. La gratitud se vuelve obvia. Hoy no es eterno. Por eso hoy es sagrado.",source:"S\xE9neca, De Brevitate Vitae III"}},{spiritual:{title:"abre las manos",teaser:"Lo que aprietas te aprieta.",reflection:"Has estado sosteniendo todo con pu\xF1os cerrados \u2014 el negocio, los planes, la imagen, el miedo a perder. Pero las manos cerradas no pueden recibir. \xC1brelas. Ofr\xE9cemelo. No te estoy pidiendo que renuncies, te estoy pidiendo que conf\xEDes. Lo que te entrego, te lo entrego mejor que como t\xFA lo cuidabas.",source:"Salmos 37:5"},philosophical:{title:"este momento es lo \xFAnico",teaser:"El pasado ya no es. El futuro a\xFAn no. Solo ahora.",reflection:"Tienes una sola posesi\xF3n real: el momento que est\xE1s viviendo. Todo lo dem\xE1s \u2014 los recuerdos, las expectativas, las posibilidades \u2014 son sombras. La vida bien vivida no se construye con grandes proyectos sino con la atenci\xF3n plena al instante presente. Bebe el agua. Mira a quien tienes enfrente. Est\xE1s aqu\xED, ahora. Es todo lo que hay.",source:"Marco Aurelio, Meditaciones VIII"}},{spiritual:{title:"te dejo paz",teaser:"No la del mundo, la m\xEDa.",reflection:"El mundo te ofrece paz cuando todo va bien. Yo te ofrezco una paz distinta: una que no depende de las circunstancias, una que se sostiene aunque la tormenta no haya pasado. Es paz de pertenencia, de saber a qui\xE9n perteneces. Cuando todo a tu alrededor tiemble, esta paz te sostendr\xE1 adentro. Rec\xEDbela ahora. No la merece el mejor d\xEDa \u2014 la recibe el coraz\xF3n que conf\xEDa.",source:"Juan 14:27"},philosophical:{title:"vive bien, no hables de vivir bien",teaser:"El bien que no se practica no existe.",reflection:"Mucha gente habla de filosof\xEDa. Pocos la viven. Hablar de virtud sin practicarla es teatro. La pregunta no es qu\xE9 piensas que est\xE1 bien, es qu\xE9 haces cuando nadie ve. Cuando puedes mentir y nadie sabr\xEDa. Cuando puedes traicionar y saldr\xEDas ganando. Ah\xED se ve qui\xE9n eres. La virtud no es una idea: es una manera de moverte en el mundo.",source:"Epicteto, Discursos II"}},{spiritual:{title:"no est\xE1s trabajando para Mi amor",teaser:"Ya lo tienes. Trabaja desde \xE9l.",reflection:"Hay una diferencia enorme entre trabajar PARA ganar amor y trabajar DESDE el amor que ya tienes. La primera es esclavitud. La segunda es libertad. T\xFA ya eres mi hijo. No tienes nada que probar. Cuando te muevas en el mundo, hazlo desde esa certeza, no desde el miedo a perderme. Mi amor no es una recompensa que ganas. Es el suelo desde donde caminas.",source:"Romanos 8:15-16"},philosophical:{title:"saber qu\xE9 quieres",teaser:"La mayor\xEDa se pierde porque nunca se aclara.",reflection:"El que no sabe qu\xE9 quiere termina queriendo lo que otros le venden. Antes de moverte hacia algo, detente y preg\xFAntate: \xBFesto es m\xEDo, o es prestado? \xBFlo deseo de verdad, o solo lo deseo porque otros lo desean? La claridad de identidad es el verdadero privilegio. Ella te ahorra a\xF1os de perseguir caminos equivocados, hechos para otros.",source:"Naval Ravikant"}},{spiritual:{title:"est\xE1s de paso",teaser:"Esto no es tu casa final.",reflection:"Te apegas a lo que tienes \u2014 y est\xE1 bien amarlo. Pero recuerda: nada de esto es para siempre. Tu hogar verdadero est\xE1 conmigo. Vive pleno aqu\xED, ama profundo, construye con cuidado, pero no te aferres como si esto fuera todo. Eres peregrino, no propietario. Y eso te libera para amar sin miedo a perder.",source:"Hebreos 11:13"},philosophical:{title:"siembras lo que ser\xE1s",teaser:"Cada d\xEDa est\xE1s plantando algo.",reflection:"Lo que comes, lo que lees, las personas a quienes escuchas, los pensamientos que entretienes \u2014 todo eso son semillas. Y cosechar\xE1s de ellas. No de las que dijiste plantar, no de las que pretendes plantar \u2014 de las que de verdad plantas, d\xEDa tras d\xEDa. Mira tu vida actual: es la cosecha de tus h\xE1bitos pasados. Mira tus h\xE1bitos hoy: son tu vida futura.",source:"Jung, El Hombre y sus S\xEDmbolos"}},{spiritual:{title:"Yo proveo",teaser:"No has visto al justo desamparado.",reflection:"Te angustias por lo que viene \u2014 el dinero, las decisiones, los pr\xF3ximos meses. Yo entiendo, eres responsable, te importa cuidar a los tuyos. Pero conf\xEDa: Yo he provisto antes y proveer\xE9 ahora. Mira para atr\xE1s. Cuenta las veces que pensaste que no se pod\xEDa y se pudo. No es suerte. Soy Yo. Sigue caminando, sigue trabajando, pero suelta el peso. Yo cargo lo que t\xFA no puedes.",source:"Salmos 37:25"},philosophical:{title:"el que se sostiene gana",teaser:"La consistencia humilde derrota al talento ruidoso.",reflection:"El mundo aplaude al que destaca un d\xEDa. Pero la verdadera fuerza est\xE1 en quien se sostiene mil d\xEDas sin destacar. La consistencia silenciosa, repetida, sin p\xFAblico \u2014 esa es la moneda que nadie acumula porque nadie tiene paciencia para hacerlo. El que aprende a amar lo cotidiano gana algo que el aplauso no compra: una vida construida desde adentro.",source:"S\xE9neca, Cartas a Lucilio LXXVI"}},{spiritual:{title:"te llam\xE9 por tu nombre",teaser:"No est\xE1s aqu\xED por accidente.",reflection:"Hay momentos donde dudas si est\xE1s haciendo lo correcto, si est\xE1s en el lugar correcto, si esta vida que construyes es la que deb\xEDas construir. Esc\xFAchame: te llam\xE9 por tu nombre. Lo que tienes \u2014 la pareja que amas, el trabajo que haces, las personas a tu alrededor \u2014 no es coincidencia. Es vocaci\xF3n. Camina con esa certeza. No tienes que resolverlo todo. Solo responder a lo que ya est\xE1 claro hoy.",source:"Isa\xEDas 43:1"},philosophical:{title:"decide y deja de decidir",teaser:"La indecisi\xF3n cuesta m\xE1s que cualquier elecci\xF3n equivocada.",reflection:"Mucha gente se desgasta no en lo dif\xEDcil, sino en la duda perpetua. Considera, mide, escucha \u2014 pero despu\xE9s decide y mu\xE9vete. Una elecci\xF3n imperfecta ejecutada con convicci\xF3n supera a la elecci\xF3n perfecta que nunca se realiza. La voluntad clara es m\xE1s rara que el talento. Por eso tan pocos llegan donde quieren ir.",source:"Frankl, El Hombre en Busca de Sentido"}},{spiritual:{title:"no est\xE1s hecho para solo",teaser:"Te di a alguien para caminar.",reflection:"Te di a quienes amas no como adorno, sino como parte esencial de tu camino conmigo. La pareja a tu lado, los amigos verdaderos, la familia \u2014 son los rostros con los que Yo te recuerdo qui\xE9n eres. No los des por sentado. Detente hoy, mira a quien tienes enfrente, y agradece. La comuni\xF3n es uno de los lenguajes m\xE1s altos en los que te hablo.",source:"Eclesiast\xE9s 4:9-10"},philosophical:{title:"estar solo sin estar perdido",teaser:"El que no soporta su propia compa\xF1\xEDa huye toda su vida.",reflection:"Hay una soledad que duele y otra que ense\xF1a. La que duele es la que evades \u2014 encendiendo el tel\xE9fono, llenando los silencios, saliendo a no estar. La que ense\xF1a es la que aceptas \u2014 sentarte contigo mismo, escuchar tus pensamientos sin distraerte, conocerte sin huir. Quien aprende a habitar su soledad ya no la teme. Y desde ah\xED, ama mejor. Porque ya no necesita al otro para escapar de s\xED mismo.",source:"Rumi, Div\xE1n de Shams"}},{spiritual:{title:"lo nuevo viene",teaser:"Lo que sembraste con l\xE1grimas, lo cosechar\xE1s con cantos.",reflection:"Ha habido tiempos donde pensaste que no se abr\xEDa nada. Donde la espera se hac\xEDa larga, donde rezabas y parec\xEDa silencio. Pero Yo no estaba dormido. Estaba preparando algo. Lo nuevo viene. No siempre como t\xFA lo imaginas \u2014 a veces es mejor, a veces es distinto, siempre es a tiempo. Sost\xE9n la esperanza. No es ingenuidad: es confianza activa.",source:"Salmos 126:5-6"},philosophical:{title:"el tiempo es lo \xFAnico",teaser:"Lo cuidas peor que cualquier otra cosa.",reflection:"Cuidas tu dinero, cuidas tu cuerpo, cuidas tu reputaci\xF3n. Pero tu tiempo \u2014 el \xFAnico recurso verdaderamente irreemplazable \u2014 lo entregas a casi cualquiera. A pantallas, a conversaciones triviales, a urgencias ajenas. Mira a qui\xE9n y a qu\xE9 le est\xE1s dando los minutos que no recuperar\xE1s. Eso, m\xE1s que ninguna otra cosa, es tu vida en construcci\xF3n.",source:"S\xE9neca, De Brevitate Vitae I"}},{spiritual:{title:"no por m\xE9rito",teaser:"Todo lo que tienes es regalo.",reflection:"Es tentador ver tu vida y atribuirte todo el m\xE9rito. T\xFA trabajaste, t\xFA decidiste, t\xFA construiste. Y s\xED \u2014 pero antes de ti, estuve Yo. Quien te dio la salud para trabajar, la mente para decidir, las personas que te ayudaron en silencio. Recon\xF3celo y todo se reordena. La gratitud no es un sentimiento bonito \u2014 es la postura correcta del que ve claro.",source:"Santiago 1:17"},philosophical:{title:"el que sabe poco habla mucho",teaser:"La verdadera sabidur\xEDa es callar oportunamente.",reflection:"La humildad no es pensar menos de ti, es pensar menos en ti. Quien tiene algo real que decir lo dice solo cuando importa, sin ansiedad de demostrar. El que m\xE1s sabe entiende lo poco que sabe \u2014 y eso lo vuelve atento, paciente, capaz de escuchar. La arrogancia es la enfermedad de los que apenas comienzan. La humildad es el aroma de los que llegaron lejos.",source:"Lao Tse, Tao Te Ching LVI"}}];function dv({savedPhrases:e,me:t,onClose:a,onUpdateReflection:o,onUnsave:r}){let[s,l]=(0,I.useState)(null),[i,u]=(0,I.useState)(null),[c,f]=(0,I.useState)(""),[p,h]=(0,I.useState)(null),x=(y,S)=>{for(let w of Us){let C=w[S];if(C&&C.title===y)return C}return null},L=(0,I.useMemo)(()=>{let y={};return(e||[]).forEach(S=>{y[S.date]||(y[S.date]=[]),y[S.date].push(S)}),Object.keys(y).forEach(S=>{y[S].sort((w,C)=>w.phrase_kind.localeCompare(C.phrase_kind))}),y},[e]),v=(0,I.useMemo)(()=>Object.keys(L).sort((y,S)=>S.localeCompare(y)),[L]),b=y=>{try{let S=new Date(y+"T12:00:00"),w=mt(),C=mt(new Date(Date.now()-864e5));return y===w?"hoy":y===C?"ayer":new Intl.DateTimeFormat("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(S).toLowerC
